<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Prendre rendez-vous</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  body { font-family: "Inter", system-ui, sans-serif !important; }
  :root { --b:#2563eb; --ink:#111827; --grey:#6b7280; --line:#e5e7eb; --bg:#f9fafb; --green:#059669; }
  * { box-sizing:border-box; }
  body { font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; margin:0; background:var(--bg); color:var(--ink); }
  header { background:#fff; border-bottom:1px solid var(--line); padding:16px 24px; }
  header h1 { margin:0; font-size:18px; }
  header p { margin:4px 0 0; color:var(--grey); font-size:13px; }
  main { max-width:760px; margin:24px auto; padding:0 16px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:12px; padding:18px; margin-bottom:16px; }
  .card h2 { font-size:13px; text-transform:uppercase; letter-spacing:.04em; color:var(--grey); margin:0 0 12px; }
  .services { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:10px; }
  .svc { border:1px solid var(--line); border-radius:10px; padding:12px; cursor:pointer; }
  .svc.sel { border-color:var(--b); box-shadow:0 0 0 2px #dbeafe; }
  .svc b { display:block; } .svc small { color:var(--grey); }
  .slots { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; }
  .slot { border:1px solid var(--line); border-radius:8px; padding:8px; text-align:center; cursor:pointer; font-size:13px; background:#fff; }
  .slot.sel { background:var(--b); color:#fff; border-color:var(--b); }
  label { display:block; font-size:12px; color:var(--grey); margin:8px 0 4px; }
  input { width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:14px; }
  button { font-size:15px; border:none; border-radius:9px; padding:11px 16px; cursor:pointer; background:var(--b); color:#fff; width:100%; }
  .ok { background:#d1fae5; color:var(--green); padding:12px; border-radius:10px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
</style>
</head>
<body>
<header>
  <h1 id="bizName">Prendre rendez-vous</h1>
  <p>Réservez en ligne en 30 secondes, 24h/24<span id="bizSuffix"></span></p>
</header>
<main>
  <div class="card">
    <h2>1. Choisissez une prestation</h2>
    <div class="services" id="services"></div>
  </div>
  <div class="card" id="slotCard" style="display:none">
    <h2>2. Choisissez un créneau</h2>
    <div class="slots" id="slots"></div>
  </div>
  <div class="card" id="formCard" style="display:none">
    <h2>3. Vos coordonnées</h2>
    <div class="grid2">
      <div><label>Nom</label><input id="name" placeholder="Jean Dupont" /></div>
      <div><label>Téléphone</label><input id="phone" placeholder="06 12 34 56 78" /></div>
    </div>
    <label>Email</label><input id="email" placeholder="jean@example.fr" />
    <label>Adresse / précisions</label><input id="address" placeholder="12 rue des Lilas, Lyon" />
    <div style="margin-top:14px"><button onclick="confirmBooking()">Confirmer le rendez-vous</button></div>
  </div>
  <div id="result"></div>
</main>

<script>
let services=[], sel=null, slot=null;
const ACCT = new URLSearchParams(location.search).get('account')||'';
const Q = ACCT ? ('&account='+encodeURIComponent(ACCT)) : '';
const fmt = iso => new Date(iso).toLocaleString('fr-FR',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',timeZone:'UTC'});

async function init(){
  try{const biz=await (await fetch('/api/business?account='+encodeURIComponent(ACCT))).json(); if(biz&&biz.name){document.title='Prendre rendez-vous \u2014 '+biz.name; var _h=document.getElementById('bizName'); if(_h)_h.textContent='Prendre rendez-vous \u2014 '+biz.name; var _s=document.getElementById('bizSuffix'); if(_s)_s.textContent=' \u2014 '+biz.name;}}catch(e){}
  services = await (await fetch('/api/booking/services?_=1'+Q)).json();
  document.getElementById('services').innerHTML = services.map(s=>`
    <div class="svc" data-id="${s.id}" onclick="pick('${s.id}')">
      <b>${s.name}</b><small>${s.durationMin} min — ${s.description||''}</small></div>`).join('');
}
async function pick(id){
  sel=id; slot=null;
  document.querySelectorAll('.svc').forEach(e=>e.classList.toggle('sel', e.dataset.id===id));
  const slots = await (await fetch(`/api/booking/slots?serviceId=${id}&days=7${Q}`)).json();
  document.getElementById('slotCard').style.display='block';
  document.getElementById('formCard').style.display='none';
  document.getElementById('result').innerHTML='';
  document.getElementById('slots').innerHTML = slots.slice(0,18).map(s=>`
    <div class="slot" data-s="${s.start}" onclick="pickSlot('${s.start}')">${fmt(s.start)}</div>`).join('')
    || '<p style="color:#6b7280">Aucun créneau disponible.</p>';
}
function pickSlot(s){
  slot=s;
  document.querySelectorAll('.slot').forEach(e=>e.classList.toggle('sel', e.dataset.s===s));
  document.getElementById('formCard').style.display='block';
}
async function confirmBooking(){
  const body={ accountId:ACCT||undefined, serviceId:sel, start:slot, customer:{
    name:document.getElementById('name').value, phone:document.getElementById('phone').value,
    email:document.getElementById('email').value, address:document.getElementById('address').value }};
  const r = await fetch('/api/booking/book',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d = await r.json();
  document.getElementById('result').innerHTML = d.error
    ? `<div class="card" style="color:#dc2626">${d.error}</div>`
    : `<div class="card"><div class="ok">✓ Rendez-vous confirmé (${d.id}) le ${fmt(d.start)}. Un SMS de confirmation vous sera envoyé.</div></div>`;
  if(!d.error){ document.getElementById('slotCard').style.display='none'; document.getElementById('formCard').style.display='none'; }
}
init();
</script>
</body>
</html>
