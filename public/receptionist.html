<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Réceptionniste IA — simulation d'appel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  body { font-family: "Inter", system-ui, sans-serif !important; }
  :root { --b:#2563eb; --ink:#111827; --grey:#6b7280; --line:#e5e7eb; --bg:#f9fafb; }
  * { box-sizing:border-box; }
  body { font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; margin:0; background:var(--bg); color:var(--ink); }
  header { background:#fff; border-bottom:1px solid var(--line); padding:16px 24px; }
  header h1 { margin:0; font-size:18px; } header p { margin:4px 0 0; color:var(--grey); font-size:13px; }
  main { max-width:640px; margin:24px auto; padding:0 16px; }
  .phone { background:#fff; border:1px solid var(--line); border-radius:16px; padding:16px; min-height:360px; display:flex; flex-direction:column; }
  .msgs { flex:1; display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
  .b { align-self:flex-start; background:#eff6ff; color:#1e3a8a; padding:9px 12px; border-radius:12px 12px 12px 2px; max-width:80%; font-size:14px; }
  .c { align-self:flex-end; background:var(--b); color:#fff; padding:9px 12px; border-radius:12px 12px 2px 12px; max-width:80%; font-size:14px; }
  .row { display:flex; gap:8px; }
  input { flex:1; padding:10px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
  button { border:none; border-radius:9px; padding:10px 14px; background:var(--b); color:#fff; cursor:pointer; }
  .ex { margin-top:12px; font-size:12px; color:var(--grey); }
  .ex b { color:var(--ink); }
  .chip { display:inline-block; background:#fff; border:1px solid var(--line); border-radius:999px; padding:4px 10px; margin:3px 4px 0 0; cursor:pointer; font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>Réceptionniste IA — simulation d'appel 📞</h1>
  <p>L'IA répond, qualifie la demande, collecte les infos et prend le RDV automatiquement.</p>
</header>
<main>
  <div class="phone">
    <div class="msgs" id="msgs"></div>
    <div class="row">
      <input id="inp" placeholder="Tapez ce que dirait le client…" onkeydown="if(event.key==='Enter')send()" />
      <button onclick="send()">Envoyer</button>
    </div>
  </div>
  <div class="ex">
    <b>Essayez :</b>
    <span class="chip" onclick="quick(this)">J'ai une fuite urgente sous l'évier</span>
    <span class="chip" onclick="quick(this)">Jean Dupont</span>
    <span class="chip" onclick="quick(this)">06 12 34 56 78</span>
    <span class="chip" onclick="quick(this)">oui parfait</span>
  </div>
</main>
<script>
let callId=null;
const msgs=document.getElementById('msgs');
function add(text, who){ const d=document.createElement('div'); d.className=who; d.textContent=text; msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight; }
async function start(){
  const r = await (await fetch('/api/receptionist/start',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'})).json();
  callId=r.callId; add(r.reply,'b');
}
async function send(){
  const inp=document.getElementById('inp'); const t=inp.value.trim(); if(!t) return;
  add(t,'c'); inp.value='';
  const r = await (await fetch('/api/receptionist/turn',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({callId,utterance:t})})).json();
  add(r.reply,'b');
  if(r.done && r.appointment) add('✅ RDV '+r.appointment.id+' enregistré dans l\'agenda.','b');
}
function quick(el){ document.getElementById('inp').value=el.textContent; send(); }
start();
</script>
</body>
</html>
